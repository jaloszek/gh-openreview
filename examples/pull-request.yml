# Standard caller workflow. Copy to .github/workflows/opencode-review.yml in
# your repo and add an OPENCODE_API_KEY secret.
#
# Triggers: every PR event, an `@openreview` comment, and the `opencode-review`
# label. The action gates the comment trigger to trusted authors; the label can
# only be added by users with write access. See ../SECURITY.md.
name: OpenCode PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  issue_comment:
    types: [created]
  pull_request_target:
    types: [labeled]

concurrency:
  group: opencode-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest # ← change to e.g. [self-hosted, linux, x64] if desired
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: jaloszek/gh-openreview/action@v1
        with:
          opencode-api-key: ${{ secrets.OPENCODE_API_KEY }}
          # model: opencode/deepseek-v4-flash-free
          # trigger-phrase: "@openreview"
          # trigger-label: "opencode-review"
