# Review using AWS Bedrock with short-lived OIDC credentials — no long-lived
# API key stored in the repo. Requires:
#   - an opencode.json in your repo with an `amazon-bedrock` provider block,
#   - an IAM role trusting GitHub's OIDC provider (configure-aws-credentials docs).
name: OpenCode PR Review (Bedrock)

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: opencode-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write # required for OIDC
    steps:
      # Obtain temporary AWS creds BEFORE the action; opencode's Bedrock provider
      # reads them from the standard AWS environment.
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::<ACCOUNT_ID>:role/<ROLE_NAME>
          aws-region: us-east-1
      - uses: jaloszek/gh-openreview/action@v1
        with:
          # no opencode-api-key — auth comes from the AWS credential chain
          model: amazon-bedrock/anthropic.claude-3-5-sonnet-20241022-v2:0
