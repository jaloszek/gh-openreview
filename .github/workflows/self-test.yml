# Dogfood: the action reviews its own PRs.
name: Self-test (OpenCode PR Review)

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  issue_comment:
    types: [created]
  pull_request_target:
    types: [labeled]

concurrency:
  group: self-test-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./action
        with:
          opencode-api-key: ${{ secrets.OPENCODE_API_KEY }}
