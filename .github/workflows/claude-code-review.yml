name: "Claude Code Review"

# Opt-in comparison reviewer (vs the automatic opencode self-test). Fires ONLY:
#   - manually via workflow_dispatch with a PR number, or
#   - when the `claude-review` label is added to a PR.
# Nothing runs on plain pushes/opens — this is a paid, on-demand second opinion.
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: string
  pull_request:
    types: [labeled]

concurrency:
  group: claude-code-review-${{ inputs.pr_number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'claude-review'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # On dispatch there is no PR event ref — check out the PR head by
          # number; on the labeled event the default checkout is correct.
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/pull/{0}/head', inputs.pr_number) || '' }}
          fetch-depth: 0

      - name: PR Review with Progress Tracking
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # track_progress only supports PR/issue events, not workflow_dispatch.
          track_progress: ${{ github.event_name == 'pull_request' }}
          use_sticky_comment: false
          include_fix_links: false
          show_full_output: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ inputs.pr_number || github.event.pull_request.number }}

            Perform a comprehensive code review with the following focus areas:

            1. Code Quality
               - Clean code principles and best practices
               - Proper error handling and edge cases
               - Code readability and maintainability

            2. Security
               - Check for potential security vulnerabilities
               - Validate input sanitization
               - Review authentication/authorization logic

            3. Performance
               - Identify potential performance bottlenecks
               - Review database queries for efficiency
               - Check for memory leaks or resource issues

            4. Testing
               - Verify adequate test coverage
               - Review test quality and edge cases
               - Check for missing test scenarios

            5. PR Description Quality
               - Review and propose improved PR description
               - Description must be human-readable, focused on facts, fast to understand

            6. Project Conventions
               - Read project conventions if exists (usually in conventions/)
               - Check if proposed changes met project conventions and code style

            Order ALL findings by severity, most critical first.
            Severity labels (use exactly these):
            - 🔴 Critical — bugs, security vulnerabilities, data loss risks, production outage potential
            - 🟠 High — race conditions, missing error handling, incorrect edge case behavior
            - 🟡 Medium — needs verification or action, performance issues, unused but wired-up code
            - 🔵 Low — cosmetic, test-only issues, gracefully handled edge cases
            - ⚪ Info — intentional trade-offs, acknowledged risks, noting good practice
            - ✅ None — no action needed, noting good design

            Posting: if you have a tracking comment (PR-event runs), put the full
            review there. Otherwise (manual dispatch), post the review on the PR
            as a single comment whose body MUST start with this exact line:
            ## 🔍 Code Review

            In BOTH posting modes, end the review body with these two elements,
            in this order:

            1. A collapsed machine-readable findings block (enables automated
               comparison against the OpenCode reviewer — keep the schema exact):

               <details><summary>🔍 Machine-readable findings (for agents)</summary>

               ```tsv
               sev	conf	path	line	title	body
               ```

               One tab-separated row per finding. Map severities: 🔴/🟠 →
               `important`, 🟡/🔵 → `nit`; omit ⚪/✅ rows. `conf` is your own
               confidence (`high|med|low`). `body` must be a single line.
               Close the block with </details>.

            2. The literal final line (cleanup marker for older runs):
               <!-- claude-review -->

          claude_args: |
            --max-turns 60
            --model claude-fable-5
            --allowedTools "pull_request_review_write,add_comment_to_pending_review,mcp__github_comment__update_claude_comment,Bash(gh api:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Write,Glob,Grep"

      - name: Cleanup old review comments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ inputs.pr_number || github.event.pull_request.number }}
          REPO=${{ github.repository }}
          KEEP_LAST=1

          # Both Claude review and this step use GITHUB_TOKEN (github-actions[bot]),
          # so deleting own comments does not generate notifications. Match on the
          # hidden <!-- claude-review --> marker (required in the prompt), plus
          # legacy patterns for comments posted before the marker existed. The
          # OpenCode reviewer also posts as github-actions[bot] but starts with
          # "## 🤖 OpenCode Review" and carries an openreview:state marker — the
          # startswith/contains tests below can never match it; keep it that way.
          ALL_IDS=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" --paginate \
            --jq '.[] | select(.user.login == "github-actions[bot]") | select((.body | contains("<!-- claude-review -->")) or (.body | contains("Claude finished")) or (.body | startswith("## 🔍 Code Review"))) | .id')
          COMMENT_IDS=$(printf '%s\n' "$ALL_IDS" | sed '/^$/d' | awk -v k="$KEEP_LAST" '{a[NR]=$0} END{for(i=1;i<=NR-k;i++) print a[i]}')

          if [ -z "$COMMENT_IDS" ]; then
            echo "No old comments to clean up"
          else
            for COMMENT_ID in $COMMENT_IDS; do
              if gh api "repos/${REPO}/issues/comments/${COMMENT_ID}" -X DELETE 2>/dev/null; then
                echo "Deleted comment $COMMENT_ID"
              else
                echo "Warning: Failed to delete comment $COMMENT_ID (may already be deleted)"
              fi
            done
            echo "Cleanup complete"
          fi
