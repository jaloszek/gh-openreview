name: "Claude Code Review"

# Opus is no longer the default reviewer — opencode-review.yml reviews every PR
# for free. This workflow is now an opt-in fallback: add the `opus-review` label
# to a PR to fire it (the `labeled` trigger + the job-level `if` guard below).
on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened, labeled]

concurrency:
  group: claude-code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Fire on opened/synchronize/reopened/ready_for_review when the label is
    # already present; on a `labeled` event, only when the label JUST added is
    # `opus-review` — otherwise adding any unrelated label to an already-labeled
    # PR would needlessly re-run the paid Opus review.
    if: >-
      contains(github.event.pull_request.labels.*.name, 'opus-review') &&
      (github.event.action != 'labeled' || github.event.label.name == 'opus-review')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: PR Review with Progress Tracking
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          track_progress: true
          use_sticky_comment: false
          include_fix_links: false
          show_full_output: ${{ runner.debug == '1' }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Perform a comprehensive code review with the following focus areas:

            1. Code Quality
               - Clean code principles and best practices
               - Proper error handling and edge cases
               - Code readability and maintainability

            2. Security
               - Check for potential security vulnerabilities
               - Validate input sanitization
               - Review authentication/authorization logic

            3. Performance
               - Identify potential performance bottlenecks
               - Review database queries for efficiency
               - Check for memory leaks or resource issues

            4. Testing
               - Verify adequate test coverage
               - Review test quality and edge cases
               - Check for missing test scenarios

            5. PR Description Quality
               - Review and propose improved PR description
               - Description must be human-readable, focused on facts, fast to understand

            6. Project Conventions
               - Read project conventions if exists (usually in conventions/)
               - Check if proposed changes met project conventions and code style

            Order ALL findings by severity, most critical first.
            Severity labels (use exactly these):
            - 🔴 Critical — bugs, security vulnerabilities, data loss risks, production outage potential
            - 🟠 High — race conditions, missing error handling, incorrect edge case behavior
            - 🟡 Medium — needs verification or action, performance issues, unused but wired-up code
            - 🔵 Low — cosmetic, test-only issues, gracefully handled edge cases
            - ⚪ Info — intentional trade-offs, acknowledged risks, noting good practice
            - ✅ None — no action needed, noting good design

          claude_args: |
            --max-turns 60
            --model opus
            --allowedTools "pull_request_review_write,add_comment_to_pending_review,mcp__github_comment__update_claude_comment,Bash(gh api *),Bash(gh pr comment *),Bash(gh pr diff *),Bash(gh pr view *),Read,Glob,Grep"

      - name: Cleanup old review comments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}
          KEEP_LAST=1

          # Both Claude review and this step use GITHUB_TOKEN (github-actions[bot]),
          # so deleting own comments does not generate notifications.
          COMMENT_IDS=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --paginate \
            --jq '[.[] | select(.user.login == "github-actions[bot]") | select(.body | test("Claude finished")) | .id] | reverse | .['${KEEP_LAST}':][]')

          if [ -z "$COMMENT_IDS" ]; then
            echo "No old comments to clean up"
          else
            for COMMENT_ID in $COMMENT_IDS; do
              if gh api "repos/${REPO}/issues/comments/${COMMENT_ID}" -X DELETE 2>/dev/null; then
                echo "Deleted comment $COMMENT_ID"
              else
                echo "Warning: Failed to delete comment $COMMENT_ID (may already be deleted)"
              fi
            done
            echo "Cleanup complete"
          fi
