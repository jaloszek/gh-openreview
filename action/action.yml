name: "OpenCode PR Review"
description: "Free-first, provider-agnostic LLM pull-request reviewer on the OpenCode harness."
author: "jaloszek"
branding:
  icon: "git-pull-request"
  color: "purple"

inputs:
  opencode-api-key:
    description: "OpenCode Zen API key. Optional — omit when supplying provider creds another way (e.g. AWS env/OIDC for Bedrock)."
    required: false
    default: ""
  opencode-config:
    description: "Path to an opencode.json to use. Optional — falls back to the consumer repo's config, then the bundled free-model config."
    required: false
    default: ""
  model:
    description: "opencode model id for the analysis (generate) pass."
    required: false
    default: "opencode/deepseek-v4-flash-free"
  verify-model:
    description: "opencode model id for the (cheaper) verification pass. Defaults to `model` when empty."
    required: false
    default: ""
  diff-exclude:
    description: "Extended-regex matched against each changed file's path; matching files are dropped from the reviewed diff. Empty uses the built-in defaults (lockfiles, generated, vendored, minified); set to `none` to review every file."
    required: false
    default: ""
  diff-max-lines:
    description: "Truncate the reviewed diff to this many lines (caps prompt cost on huge PRs). 0 disables truncation."
    required: false
    default: "4000"
  github-token:
    description: "Token used to fetch context and post the comment."
    required: false
    default: ${{ github.token }}
  trigger-phrase:
    description: "Comment body that triggers an on-demand review (issue_comment events)."
    required: false
    default: "@openreview"
  trigger-label:
    description: "Label whose addition triggers a review (labeled events)."
    required: false
    default: "opencode-review"
  marker-header:
    description: "Identity/dedup header (first line of the posted comment). Keep the text 'OpenCode Review' for reliable dedup."
    required: false
    default: "## 🤖 OpenCode Review"
  bot-login:
    description: "Comment author whose stale reviews are pruned."
    required: false
    default: "github-actions[bot]"

runs:
  using: "composite"
  steps:
    # Normalize the three trigger shapes into should_run + pr number. No token
    # needed (everything comes from the event payload). The `@openreview`
    # comment trigger is gated to trusted authors so an arbitrary commenter on a
    # public repo cannot start a secret-bearing run (label adds already require
    # write access).
    - name: Resolve context
      id: ctx
      shell: bash
      env:
        EVENT: ${{ github.event_name }}
        ACTION: ${{ github.event.action }}
        PR_PR: ${{ github.event.pull_request.number }}
        PR_ISSUE: ${{ github.event.issue.number }}
        IS_PR_URL: ${{ github.event.issue.pull_request.url }}
        COMMENT_BODY: ${{ github.event.comment.body }}
        COMMENT_ASSOC: ${{ github.event.comment.author_association }}
        LABEL_NAME: ${{ github.event.label.name }}
        TRIGGER_PHRASE: ${{ inputs.trigger-phrase }}
        TRIGGER_LABEL: ${{ inputs.trigger-label }}
      run: |
        run=false; pr=""
        is_trusted() { case "$1" in OWNER|MEMBER|COLLABORATOR) return 0 ;; *) return 1 ;; esac; }
        case "$EVENT" in
          pull_request|pull_request_target)
            if [ "$ACTION" = "labeled" ]; then
              [ "$LABEL_NAME" = "$TRIGGER_LABEL" ] && { run=true; pr="$PR_PR"; }
            else
              run=true; pr="$PR_PR"
            fi ;;
          issue_comment)
            if [ -n "$IS_PR_URL" ] && printf '%s' "$COMMENT_BODY" | grep -qF "$TRIGGER_PHRASE"; then
              if is_trusted "$COMMENT_ASSOC"; then
                run=true; pr="$PR_ISSUE"
              else
                echo "::notice::ignoring $TRIGGER_PHRASE from untrusted author (association: ${COMMENT_ASSOC:-none})"
              fi
            fi ;;
        esac
        {
          echo "should_run=$run"
          echo "pr=$pr"
        } >> "$GITHUB_OUTPUT"
        echo "event=$EVENT action=${ACTION:-} should_run=$run pr=$pr"

    # Check out the PR HEAD. For issue_comment/labeled events GITHUB_SHA points
    # at the base branch, so refs/pull/<n>/head is required.
    - name: Checkout PR head
      if: steps.ctx.outputs.should_run == 'true'
      uses: actions/checkout@v6
      with:
        repository: ${{ github.repository }}
        ref: refs/pull/${{ steps.ctx.outputs.pr }}/head
        fetch-depth: 0
        token: ${{ inputs.github-token }}

    - name: Install opencode
      if: steps.ctx.outputs.should_run == 'true'
      shell: bash
      run: |
        if command -v opencode >/dev/null 2>&1; then exit 0; fi
        curl -fsSL https://opencode.ai/install | bash
        echo "$HOME/.opencode/bin" >> "$GITHUB_PATH"

    - name: Install gh CLI
      if: steps.ctx.outputs.should_run == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        if command -v gh >/dev/null 2>&1; then exit 0; fi
        GH_VER=$(curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" \
          https://api.github.com/repos/cli/cli/releases/latest \
          | sed -n 's/.*"tag_name": *"\([^"]*\)".*/\1/p' | head -1)
        GH_VER=${GH_VER#v}
        [ -n "$GH_VER" ] || { echo "::error::could not resolve gh version"; exit 1; }
        curl -fsSL "https://github.com/cli/cli/releases/download/v${GH_VER}/gh_${GH_VER}_linux_amd64.tar.gz" -o /tmp/gh.tar.gz
        mkdir -p "$HOME/.local/gh"
        tar -xzf /tmp/gh.tar.gz -C "$HOME/.local/gh" --strip-components=1
        echo "$HOME/.local/gh/bin" >> "$GITHUB_PATH"

    - name: Prepare engine environment
      if: steps.ctx.outputs.should_run == 'true'
      shell: bash
      env:
        MODEL: ${{ inputs.model }}
        VERIFY_MODEL: ${{ inputs.verify-model }}
        DIFF_EXCLUDE: ${{ inputs.diff-exclude }}
        DIFF_MAX_LINES: ${{ inputs.diff-max-lines }}
        MARKER: ${{ inputs.marker-header }}
        BOT: ${{ inputs.bot-login }}
      run: |
        {
          echo "OR_REPO=${{ github.repository }}"
          echo "OR_PR=${{ steps.ctx.outputs.pr }}"
          # Feed the model through OPENREVIEW_MODEL — the engine's resolve_model()
          # recomputes OR_MODEL from (--model flag > OPENREVIEW_MODEL > OC_MODEL >
          # default), so setting OR_MODEL directly here was silently overwritten
          # and the `model` input was ignored (every run fell back to the free
          # default). OPENREVIEW_MODEL is the precedence key resolve_model honors.
          echo "OPENREVIEW_MODEL=$MODEL"
          # Verify pass runs on a (typically cheaper) tier; empty -> main model.
          [ -n "$VERIFY_MODEL" ] && echo "OPENREVIEW_VERIFY_MODEL=$VERIFY_MODEL"
          # Diff excludes: empty -> engine built-in defaults; `none` -> disable.
          case "$DIFF_EXCLUDE" in
            "") : ;;
            none) echo "OPENREVIEW_DIFF_EXCLUDE=" ;;
            *) echo "OPENREVIEW_DIFF_EXCLUDE=$DIFF_EXCLUDE" ;;
          esac
          echo "OPENREVIEW_DIFF_MAX_LINES=$DIFF_MAX_LINES"
          echo "MARKER=$MARKER"
          echo "BOT_LOGIN=$BOT"
          echo "OR_DIR=$GITHUB_WORKSPACE"
          echo "SCRATCH_REL=.openreview-tmp"
          echo "SCRATCH=$GITHUB_WORKSPACE/.openreview-tmp"
        } >> "$GITHUB_ENV"
        mkdir -p "$GITHUB_WORKSPACE/.openreview-tmp"

    # Token-scoped: only gather/post see GH_TOKEN. The model pass below does not.
    - name: Gather PR context
      if: steps.ctx.outputs.should_run == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: ${{ github.action_path }}/../lib/gather.sh

    - name: Review passes (no GitHub token)
      id: passes
      if: steps.ctx.outputs.should_run == 'true'
      shell: bash
      env:
        OPENCODE_API_KEY: ${{ inputs.opencode-api-key }}
        OPENCODE_CONFIG: ${{ inputs.opencode-config }}
      run: ${{ github.action_path }}/../lib/passes.sh

    # Deterministic render — no model call, no token. Builds the final comment
    # from the verified findings. Runs only when the passes succeeded, so an
    # engine failure never produces a misleading "no issues" comment.
    - name: Render review comment
      if: steps.ctx.outputs.should_run == 'true' && steps.passes.outcome == 'success'
      shell: bash
      run: ${{ github.action_path }}/../lib/render.sh

    - name: Post review comment
      if: steps.ctx.outputs.should_run == 'true' && steps.passes.outcome == 'success'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: ${{ github.action_path }}/../lib/post.sh
